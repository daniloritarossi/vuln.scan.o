<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>VULN.SCAN.O · Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <!-- Self-hosted fonts (Inter, JetBrains Mono, Material Symbols) -->
  <link href="/static/vendor/fonts/fonts.css" rel="stylesheet" />
  <script src="/static/vendor/tailwind.js"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "fontFamily": {
            "code-sm": ["JetBrains Mono"], "headline-md": ["Inter"],
            "label-caps": ["Inter"], "body-md": ["Inter"]
          },
          "fontSize": {
            "code-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
            "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
            "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "body-md": ["15px", { "lineHeight": "24px", "fontWeight": "400" }]
          }
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .neural-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.08);
    }

    body {
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
    }
  </style>
  <script src="/static/i18n.js?v=19"></script>
</head>

<body class="font-body-md text-body-md text-slate-900 antialiased min-h-screen flex items-center justify-center p-4">
  <div class="neural-panel rounded-2xl p-8 w-full max-w-sm">
    <div class="flex flex-col items-center mb-8">
      <img src="/static/logo-icon-animated.svg" class="w-16 h-16 mb-3" alt="VULN.SCAN.O" />
      <h1 class="font-headline-md text-headline-md font-bold tracking-tight">
        <span class="text-dark400">VULN</span>
        <span class="text-orange-500">.</span>
        <span class="text-dark-400">SCAN</span>
        <span class="text-orange-500">.</span>
        <span class="text-dark-400">O</span>
      </h1>
      <p class="font-label-caps text-label-caps text-slate-400 mt-2" data-i18n="login.title">SIGN IN</p>
    </div>
    <form id="loginForm" class="space-y-4" autocomplete="on">
      <div>
        <label class="font-label-caps text-label-caps text-slate-500 block mb-1.5" for="username"
          data-i18n="login.username">USERNAME</label>
        <input id="username" name="username" type="text" required autofocus autocomplete="username"
          class="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-2.5 font-code-sm text-code-sm focus:outline-none focus:border-cyan-300 focus:ring-1 focus:ring-cyan-200 transition" />
      </div>
      <div>
        <label class="font-label-caps text-label-caps text-slate-500 block mb-1.5" for="password"
          data-i18n="login.password">PASSWORD</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
          class="w-full bg-white/80 border border-slate-200 rounded-xl px-4 py-2.5 font-code-sm text-code-sm focus:outline-none focus:border-cyan-300 focus:ring-1 focus:ring-cyan-200 transition" />
      </div>
      <p id="error"
        class="hidden font-code-sm text-code-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">
      </p>
      <p id="info"
        class="hidden font-code-sm text-code-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">
      </p>
      <button type="submit" id="submitBtn"
        class="w-full bg-slate-900 text-white hover:bg-slate-800 px-6 py-3 rounded-xl font-label-caps text-label-caps transition-all flex items-center justify-center gap-2 shadow-lg shadow-slate-900/10 disabled:opacity-40">
        <span class="material-symbols-outlined text-sm text-cyan-400">login</span> <span data-i18n="login.submit">SIGN
          IN</span>
      </button>
      <p class="text-center">
        <a href="#" id="forgotLink" class="font-code-sm text-[12px] text-cyan-600 hover:underline"
          data-i18n="login.forgot">Forgot password?</a>
      </p>
    </form>
    <p class="font-code-sm text-[11px] text-slate-400 mt-6 text-center">
      Vulnerability Feed Aggregator <span class="text-slate-500">{{ app_version }}</span>
    </p>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('error');
    const btn = document.getElementById('submitBtn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.classList.add('hidden');
      btn.disabled = true;
      try {
        const r = await fetch('/api/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const d = await r.json();
        if (!r.ok) {
          errEl.textContent = d.error || t('login.failed');
          errEl.classList.remove('hidden');
          btn.disabled = false;
          return;
        }
        location.href = d.must_change_password ? '/change-password' : '/';
      } catch (_) {
        errEl.textContent = t('login.unreachable');
        errEl.classList.remove('hidden');
        btn.disabled = false;
      }
    });

    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = window.prompt(t('login.forgot_prompt'));
      if (!email) return;
      try {
        const r = await fetch('/api/forgot', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email.trim() }),
        });
        const d = await r.json();
        const info = document.getElementById('info');
        info.textContent = d.message || 'Richiesta inviata.';
        info.classList.remove('hidden');
      } catch (_) { }
    });
  </script>
</body>

</html>
