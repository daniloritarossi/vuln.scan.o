<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stratofeed — VULN.SCAN.IO: righe di feed impilate formano il vulcano, la vetta è l'alert -->
  <!-- White background with orange border -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="100" height="100" rx="16" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Summit: the erupting feed line, the found vulnerability -->
  <path d="M42 26 H58" stroke="#f97316" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Strata: aggregated feed lines building the cone -->
  <g stroke="#1e293b" stroke-width="11" stroke-linecap="round" fill="none">
    <path d="M34 45 H66"/>
    <path d="M26 64 H74"/>
    <path d="M18 83 H82"/>
  </g>
