<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stratofeed — animated scan cycle:
       1. an orange scan beam sweeps up through the aggregated feed strata
       2. each stratum ignites as the beam passes through it
       3. the summit erupts: flare + radial ripple = vulnerability alert
       4. brief calm, then the cycle repeats -->
  <style>
    .beam {
      animation: sweep 4.8s linear infinite;
    }
    .s1 { animation: ignite1 4.8s linear infinite; }
    .s2 { animation: ignite2 4.8s linear infinite; }
    .s3 { animation: ignite3 4.8s linear infinite; }
    .summit {
      transform-origin: 50px 26px;
      animation: flare 4.8s ease-in-out infinite;
    }
    .ripple {
      transform-origin: 50px 26px;
      animation: ripple 4.8s ease-out infinite;
    }
    @keyframes sweep {
      0%   { transform: translateY(0);      opacity: 0; }
      4%   { opacity: 0.85; }
      42%  { opacity: 0.85; }
      46%  { transform: translateY(-70px);  opacity: 0; }
      100% { transform: translateY(-70px);  opacity: 0; }
    }
    /* strata ignite bottom-up as the beam passes */
    @keyframes ignite3 {
      0%, 3%, 15%, 100% { stroke: #1e293b; }
      9%                { stroke: #f97316; }
    }
    @keyframes ignite2 {
      0%, 15%, 27%, 100% { stroke: #1e293b; }
      21%                { stroke: #f97316; }
    }
    @keyframes ignite1 {
      0%, 27%, 39%, 100% { stroke: #1e293b; }
      33%                { stroke: #f97316; }
    }
    @keyframes flare {
      0%, 42%   { transform: scale(1); }
      50%       { transform: scale(1.35); }
      60%, 100% { transform: scale(1); }
    }
    @keyframes ripple {
      0%, 44%    { transform: scale(0.5); opacity: 0; }
      50%        { opacity: 0.7; }
      74%, 100%  { transform: scale(2.4); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .beam, .ripple { display: none; }
      .s1, .s2, .s3, .summit { animation: none; }
    }
  </style>

  <!-- White background with orange border -->
  <rect x="0" y="0" width="100" height="100" rx="16" fill="#ffffff"/>
  <rect x="0" y="0" width="100" height="100" rx="16" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Alert ripple: radiates from the summit on detection -->
  <circle class="ripple" cx="50" cy="26" r="12" fill="none" stroke="#f97316" stroke-width="3"/>

  <!-- Summit: flares when the scan reaches the top -->
  <path class="summit" d="M42 26 H58" stroke="#f97316" stroke-width="11" stroke-linecap="round" fill="none"/>

  <!-- Strata: aggregated feed lines, ignited by the scan -->
  <g stroke-width="11" stroke-linecap="round" fill="none" stroke="#1e293b">
    <path class="s1" d="M34 45 H66"/>
    <path class="s2" d="M26 64 H74"/>
    <path class="s3" d="M18 83 H82"/>
  </g>

  <!-- Scan beam: sweeps bottom-up through the feeds -->
  <path class="beam" d="M15 90 H85" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
